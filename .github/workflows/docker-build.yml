name: build docker image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKER_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: login docker hub
        run: echo "$DOCKER_TOKEN" | docker login -u $DOCKER_USERNAME --password-stdin

      - name: build docker image
        run: |
          docker build -t $DOCKER_USERNAME/calculator-cicd-app:${{ github.sha }} .
          docker tag $DOCKER_USERNAME/calculator-cicd-app:${{ github.sha }} $DOCKER_USERNAME/calculator-cicd-app:latest

      - name: push docker image
        run: |
          docker push $DOCKER_USERNAME/calculator-cicd-app:${{ github.sha }}
          docker push $DOCKER_USERNAME/calculator-cicd-app:latest
